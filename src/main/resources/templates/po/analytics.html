<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>PO Analytics</title>
</head>
<body>
<h1>PO Analytics</h1>
<p>Total Spend: <span th:text="${totalSpend}"></span></p>
<table>
    <thead><tr><th>Status</th><th>Count</th></tr></thead>
    <tbody>
    <tr th:each="entry : ${statusCounts}">
        <td th:text="${entry.key}"></td>
        <td th:text="${entry.value}"></td>
    </tr>
    </tbody>
 </table>
</body>
</html>
